name: Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: '🔗 YouTube or direct video URL'
        required: true
        type: string

      quality:
        description: '🎬 Video quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio

      parts_size:
        description: '🫙 Split size in MB'
        required: false
        default: '45'
        type: string

      output_name:
        description: '📝 Output file name (optional, without extension)'
        required: false
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Prepare videos branch
        run: |
          git fetch origin videos || true

          if git show-ref --verify --quiet refs/remotes/origin/videos; then
            git checkout -B videos origin/videos
          else
            git checkout --orphan videos
            git rm -rf . || true
            mkdir -p videos
            touch .gitkeep
            git add .gitkeep
            git commit -m "[bot] initialize videos branch"
            git push origin videos
          fi

          mkdir -p videos
          mkdir -p tmp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip python3-pip
          pip3 install --upgrade yt-dlp

      - name: Install Deno
        run: |
          sudo apt-get update
          sudo apt-get install -y deno || true

      - name: Download video
        id: download
        run: |
          set -e

          QUALITY="${{ inputs.quality }}"
          URL="${{ inputs.youtube_url }}"
          OUTPUT_NAME="${{ inputs.output_name }}"
          PARTS_SIZE="${{ inputs.parts_size }}"

          if [ "$QUALITY" = "audio" ]; then
            FORMAT_OPTS='-f bestaudio --extract-audio --audio-format mp3'
          elif [ "$QUALITY" = "best" ]; then
            FORMAT_OPTS='-f bestvideo+bestaudio/best --merge-output-format mp4'
          else
            FORMAT_OPTS="-f bestvideo[height<=${QUALITY}]+bestaudio/best --merge-output-format mp4"
          fi

          if [ -n "$OUTPUT_NAME" ]; then
            OUT_OPTS=(-o "${OUTPUT_NAME}.%(ext)s")
          else
            OUT_OPTS=(-o "%(title)s.%(ext)s")
          fi

          cd tmp

          echo "Running yt-dlp..."
          yt-dlp ${FORMAT_OPTS} "${OUT_OPTS[@]}" "$URL"

          FILE="$(find . -maxdepth 1 -type f | head -n 1 | sed 's|^\./||')"

          if [ -z "$FILE" ]; then
            echo "No downloaded file found."
            exit 1
          fi

          SAFE_NAME="$(basename "$FILE")"
          SAFE_NAME="${SAFE_NAME// /_}"

          echo "FILE=$FILE" >> "$GITHUB_ENV"
          echo "SAFE_NAME=$SAFE_NAME" >> "$GITHUB_ENV"

          mkdir -p ../videos
          zip -0 -s "${PARTS_SIZE}m" "../videos/${SAFE_NAME}.zip" "$FILE"

      - name: Generate README
        run: |
          rm -f README.md
          {
            echo "# 📥 Download Links"
            echo ""
            echo "Generated on: $(date -u)"
            echo ""
          } > README.md

          shopt -s nullglob
          for file in videos/*; do
            if [ -f "$file" ]; then
              name="$(basename "$file")"
              encoded=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$name")
              url="https://raw.githubusercontent.com/${{ github.repository }}/videos/videos/$encoded"
              echo "- [$name]($url)" >> README.md
            fi
          done

      - name: Commit and push
        run: |
          set -e

          git add videos README.md

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "[bot] add video ${{ env.SAFE_NAME }}"
          git push origin videos
